<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>21: Survival</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0a0a0a; color: #c00; font-family: monospace; text-align: center; }
        .btn { background: #300; color: #f00; border: 1px solid red; padding: 10px; cursor: pointer; margin: 5px; }
        input { background: #111; color: #fff; border: 1px solid #555; padding: 10px; }
    </style>
</head>
<body>
    <h1>DLC: 21 SURVIVAL</h1>
    <div id="setup">
        <button class="btn" onclick="createRoom()">СОЗДАТЬ ИГРУ</button><br><br>
        <input type="text" id="roomCode" placeholder="КОД ДРУГА">
        <button class="btn" onclick="joinRoom()">ВОЙТИ</button>
    </div>
    <div id="game" style="display:none">
        <p>Комната: <span id="roomNum"></span></p>
        <div id="status">Ожидание игрока...</div>
        <button class="btn" onclick="hit()">ВЗЯТЬ КАРТУ</button>
        <button class="btn" onclick="stay()">ПАС</button>
    </div>

    <script>
        // СЮДА ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBXGHOD4MVcRAwxUtE670bb_ZmuvHU738Y",
   authDomain: "game-a4006.firebaseapp.com",
  databaseURL: "https://game-a4006-default-rtdb.firebaseio.com",
  projectId: "game-a4006",
  storageBucket: "game-a4006.firebasestorage.app",
  messagingSenderId: "319976807513",
  appId: "1:319976807513:web:750c89eae200a1816be548",
  measurementId: "G-MQZJ3WVSJM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let room = null;

        function createRoom() {
            room = Math.floor(1000 + Math.random() * 9000);
            db.ref('rooms/' + room).set({ status: 'waiting', turn: 'host' });
            showGame();
        }

        function joinRoom() {
            room = document.getElementById('roomCode').value;
            db.ref('rooms/' + room).update({ status: 'playing' });
            showGame();
        }

        function showGame() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('roomNum').innerText = room;
            
            // Слушаем изменения в базе
            db.ref('rooms/' + room).on('value', (snap) => {
                const data = snap.val();
                document.getElementById('status').innerText = "Статус: " + data.status;
            });
        }

        function hit() { alert('Скоро добавим логику RE7!'); }
        function stay() { alert('Пас!'); }
    </script>
</body>
</html>
